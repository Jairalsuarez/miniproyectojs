<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <link href="./css/styles.css" rel="stylesheet">
    <script type="module" src="./Js/main.js"></script>
    <title>miniproyectojs</title>
  </head>
 <body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-blue-900 shadow-lg">
      <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-white font-black text-3xl tracking-tighter">
          MINI PROYECTO <span class="text-amber-400">JS</span>
        </h1>
        
        <a href="./pages/bienvenida.html" class="group relative inline-flex items-center gap-2 bg-amber-400 hover:bg-amber-500 text-blue-900 px-6 py-3 rounded-full font-bold transition-all duration-300 transform hover:scale-105 shadow-md">
          Ver Proyectos
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 group-hover:translate-x-1 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </a>
      </div>
    </header>

    <div class="flex justify-center -mt-6">
      <button id="button1" class="bg-white p-3 rounded-full shadow-xl border border-slate-200 text-blue-900 hover:text-blue-600 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8 cursor-pointer">
          <path fill-rule="evenodd" d="M3 5.25a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 5.25Zm0 4.5A.75.75 0 0 1 3.75 9h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 9.75Zm0 4.5a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Zm0 4.5a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>

    <nav id="nav" class="hidden transition-all duration-500">
      <ul class="max-w-2xl mx-auto my-6 bg-blue-800 rounded-2xl flex flex-wrap gap-4 justify-center text-white font-medium text-lg p-4 shadow-inner">
          <li class="hover:text-amber-400 transition-colors"><a href="index.html">Inicio</a></li>
          <li class="hover:text-amber-400 transition-colors"><a href="./pages/bienvenida.html">Proyectos</a></li>
          <li class="hover:text-amber-400 transition-colors"><a href="./pages/formulario.html">Formulario</a></li>
          <li class="hover:text-amber-400 transition-colors"><a href="./pages/bienvenida.html">Contacto</a></li>
      </ul>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12">
      <div id="contenedor" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </main>

    <section class="bg-slate-100 py-20 border-t border-slate-200">
      <div class="flex justify-center px-4">
        
        <form id="formulario" class="flex flex-col text-[16px] gap-3 bg-white p-6 rounded-lg shadow-md border border-[#e5e5e5] w-full max-w-md">
          <p class="text-3xl font-bold text-[#007bff] mb-2">Contactame</p>
          <label class="font-semibold">Nombre:</label>
          <input type="text" name="nombre" required placeholder="Escribe tu nombre" class="border border-[#d5d5d5] rounded-[6px] outline-none h-10 px-3 transition duration-300 focus:border-[#007bff] focus:ring-2 focus:ring-[#007bff]/20">
          <label class="font-semibold">Correo:</label>
          <input type="email" name="email" required placeholder="ejemplo@mail.com" class="border border-[#d5d5d5] rounded-[6px] outline-none h-10 px-3 transition duration-300 focus:border-[#007bff] focus:ring-2 focus:ring-[#007bff]/20">
          <label class="font-semibold">Mensaje:</label>
          <input type="text" name="mensaje" required placeholder="Escribe tu mensaje" class="border border-[#d5d5d5] rounded-[6px] outline-none h-10 px-3 transition duration-300 focus:border-[#007bff] focus:ring-2 focus:ring-[#007bff]/20">
          <button type="submit" class="bg-[#007bff] text-white h-10 rounded-[6px] mt-3 font-semibold cursor-pointer transition duration-300 hover:bg-[#0066d4] active:scale-95">
            Contactar
          </button>
        </form>

      </div>
    </section>

    <footer class="py-10 text-center text-slate-400 text-sm">
      &copy; 2026 Mini Proyecto JS. Todos los derechos reservados.
    </footer>

  </body>
</html>
