<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <SCript src="./Js/main.js" defer></SCript>
    <title>miniproyectojs</title>
    <link rel="stylesheet" crossorigin href="/assets/styles-DCbmbyT2.css">
  </head>
  <body>

    
    <header>
      <h1 class="bg-blue-800 text-center text-amber-50 font-extrabold text-3xl p-5 ">Mini Proyecto JS</h1>
      <a href="./pages/bienvenida.html">
      <h2 class="bg-amber-400 text-center p-5 text-amber-50 font-extrabold text-3xl">Ver Proyectos</h2>
      </a>
    </header>

      <div class="flex justify-center my-5">
      <button id="button1">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-12">
        <path fill-rule="evenodd" d="M3 5.25a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 5.25Zm0 4.5A.75.75 0 0 1 3.75 9h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 9.75Zm0 4.5a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Zm0 4.5a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" />
        </svg>
      </button>
      </div>
      <nav id="nav" class="hidden">
        <ul class="bg-emerald-800 flex gap-5 justify-center text-white font-bold text-4xl p-3">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="./pages/bienvenida.html">Proyectos</a></li>
            <li><a href="./pages/formulario.html">Formulario</a></li>
            <li><a href="./pages/bienvenida.html">Contacto</a></li>
        </ul>
    </nav>


    
      <div id="contenedor" class="flex flex-wrap justify-around items-center"></div>

      <div class="flex justify-center py-10">
        
        <form id="formulario" class="flex flex-col text-[16px] gap-3 bg-white p-6 rounded-lg shadow-md border border-[#e5e5e5]">

        <p class="text-3xl font-bold text-[#007bff] mb-2">
          Contactame
        </p>

        <label class="font-semibold">Nombre:</label>
        <input 
        type="text" 
        name="nombre" 
        required
        placeholder="Escribe tu nombre"
        class="border border-[#d5d5d5] rounded-[6px] outline-none h-10 px-3 transition duration-300 focus:border-[#007bff] focus:ring-2 focus:ring-[#007bff]/20">

        <label class="font-semibold">Correo:</label>
        <input 
        type="email" 
        name="email" 
        required
        placeholder="ejemplo@mail.com"
        class="border border-[#d5d5d5] rounded-[6px] outline-none h-10 px-3 transition duration-300 focus:border-[#007bff] focus:ring-2 focus:ring-[#007bff]/20">

        <label class="font-semibold">Mensaje:</label>
        <input 
        type="text" 
        name="mensaje" 
        required
        placeholder="Escribe tu mensaje"
        class="border border-[#d5d5d5] rounded-[6px] outline-none h-10 px-3 transition duration-300 focus:border-[#007bff] focus:ring-2 focus:ring-[#007bff]/20">

        <button 
        type="submit"
        class="bg-[#007bff] text-white h-10 rounded-[6px] mt-3 font-semibold cursor-pointer transition duration-300 hover:bg-[#0066d4] active:scale-95">
        Contactar
        </button>

        </form>

      </div>

  </body>
</html>
